<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
  <style>
    body { display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #ffffff; margin: 0; font-family: sans-serif; }
    .upload-btn { background-color: #ff4500; color: white; padding: 15px 30px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>

  <!-- If the button says this, we know GitHub updated successfully! -->
  <button id="upload_widget" class="upload-btn">Upload Test Video</button>

  <script type="text/javascript">
    const urlParams = new URLSearchParams(window.location.search);
    const adaloEventID = urlParams.get('eventID');

    var myWidget = cloudinary.createUploadWidget({
      cloudName: 'yown65ru',
      uploadPreset: 'jollofpics_videos',
      clientAllowedFormats: ['mp4', 'mov', 'avi'],
      maxFileSize: 500000000 
    }, (error, result) => {
      
      if (!error && result && result.event === "success") {
        document.getElementById("upload_widget").innerText = "Upload Successful!";
        
        fetch('https://hook.eu1.make.com/qn5bhha1gicvtofc2567nuddfdl7vmax', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            video_url: result.info.secure_url,
            event_id: adaloEventID
          })
        });
      }
    });

    document.getElementById("upload_widget").addEventListener("click", function(){
        myWidget.open();
      }, false);
  </script>

</body>
</html>
