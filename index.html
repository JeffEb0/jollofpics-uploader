<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
  <style>
    body { display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #ffffff; margin: 0; font-family: sans-serif; }
    .upload-btn { background-color: #ff4500; color: white; padding: 15px 30px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
  </style>
</head>
<body>

  <button id="upload_widget" class="upload-btn">Upload Video</button>

  <script type="text/javascript">
    const urlParams = new URLSearchParams(window.location.search);
    const adaloEventID = urlParams.get('eventID');

    var myWidget = cloudinary.createUploadWidget({
      cloudName: 'yown65ru',
      uploadPreset: 'jollofpics_videos',
      clientAllowedFormats: ['mp4', 'mov', 'avi'],
      maxFileSize: 500000000 
    }, (error, result) => {
      
      if (!error && result && result.event === "success") {
        
        const btn = document.getElementById("upload_widget");
        btn.innerText = "Upload Successful! 🎉";
        btn.style.backgroundColor = "#28a745";
        
        // Force-send data to Make.com with error handling
        fetch('https://hook.eu1.make.com/qn5bhha1gicvtofc2567nuddfdl7vmax', {
          method: 'POST',
          mode: 'cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            video_url: result.info.secure_url,
            event_id: adaloEventID || "missing_id"
          })
        })
        .then(response => {
          console.log("Make.com successfully notified!");
        })
        .catch(err => {
          alert("Webhook error: " + err.message);
        });

        setTimeout(() => {
          btn.innerText = "Upload Another Video";
          btn.style.backgroundColor = "#ff4500";
        }, 3000);
      }
    });

    document.getElementById("upload_widget").addEventListener("click", function(){
        myWidget.open();
      }, false);
  </script>

</body>
</html>
